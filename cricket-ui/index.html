<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#0b5ed7" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cricket Duniya" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Cricket Duniya</title>
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var theme = saved === "dark" || saved === "light" ? saved : "light";
        document.documentElement.classList.add(theme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", theme === "dark" ? "#0c0f18" : "#0b5ed7");
        var apple = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (apple) apple.setAttribute("content", theme === "dark" ? "black-translucent" : "default");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
